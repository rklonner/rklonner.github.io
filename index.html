<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Presentations</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --main-bg: #002b36;
      --main-fg: #93a1a1;
      --heading-fg: #eee8d5;
      --link: #268bd2;
      --link-hover: rgb(77,162,222);
      --card-bg: rgba(10, 30, 40, 0.89);
      --border: #073642;
    }
    body {
      background: var(--main-bg);
      color: var(--main-fg);
      font-family: Lato, 'JetBrains Mono', 'Menlo', Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .container {
      margin: 54px 0;
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: 0 6px 28px #0009;
      padding: 48px 34px;
      min-width: 340px;
      max-width: 98vw;
      border: 1.5px solid var(--border);
    }
    h1 {
      color: var(--heading-fg);
      font-size: 2.36rem;
      text-align: center;
      margin-bottom: 38px;
      font-family: League Gothic, Impact, Lato, sans-serif;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: normal;
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    li {
      margin: 0 0 18px 0;
    }
    a {
      color: var(--link);
      padding: 0.75em 0.9em;
      border-radius: 7px;
      text-decoration: none;
      font-size: 1.12rem;
      transition: color .20s, background .20s, box-shadow .24s;
      background: transparent;
      font-weight: bold;
      display: inline-block;
    }
    a:hover,
    a:focus {
      color: var(--link-hover);
      background: #073642eb;
      box-shadow: 0 2px 10px var(--link-hover)22;
      outline: none;
    }
    @media (max-width: 600px) {
      .container {
        padding: 16px 7px;
      }
      h1 {
        font-size: 1.22rem;
        margin-bottom: 18px;
      }
      a {
        font-size: 1.01rem;
        padding: 0.6em 0.7em;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Presentations</h1>
    <ul>
      <li><a href="2026-apec/reveal/index.html">GitOps Visibility: Präzise Argo CD diffs für jeden Pull Request (APEC 2026)</a></li>
      <li><a href="2026-apec/marp/index.html">GitOps Visibility: Präzise Argo CD diffs für jeden Pull Request (APEC 2026)</a></li>
      <!-- Add more presentations here as needed -->
    </ul>
  </div>
</body>
</html>
