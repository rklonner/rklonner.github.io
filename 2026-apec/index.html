<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>GitOps Visibility (Reveal.js)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimal-ui">
  <!-- Reveal.js CSS via CDN -->
  <link rel="stylesheet" href="dist/reveal.css">
  <link rel="stylesheet" href="dist/theme/moon.css" id="theme">
  <!-- Syntax highlight theme -->
  <link rel="stylesheet" href="dist/plugin/highlight/atom-one-dark.css">

    <style>
      .reveal {
        font-family: 'JetBrains Mono', 'Fira Mono', 'Menlo', 'Lato', Arial, sans-serif;
      }
      /* make font size less */
      .reveal h1 { font-size: 2.2em; }
      .reveal h2 { font-size: 1.4em; }
      .reveal h3 { font-size: 1.1em; }
      .reveal section, .reveal p, .reveal ul, .reveal ol, .reveal li { font-size: 0.9em; }
      section img { max-width: 90vw; height: auto; }
      /* chapter/titles not uppercase, only capitalized */
      .reveal h1, .reveal h2, .reveal h3, .reveal h4, .reveal h5 {
                    text-transform: none;
            }
      /* create space after lists, problem too close to next chapter */
      /* Fall 1: h1-h4 folgt direkt auf eine Liste */
      .reveal ul + :is(h1, h2, h3, h4),
      .reveal ol + :is(h1, h2, h3, h4),
      /* Fall 2: Ein Container mit h1-h4 folgt auf eine Liste */
      .reveal ul + div:has(:is(h1, h2, h3, h4)),
      .reveal ol + div:has(:is(h1, h2, h3, h4)) {
        margin-top: 1em !important;
      }
    </style>
</head>
<body>
  <div class="reveal">
    <div class="slides">
      <!-- Reveal.js loads markdown as slides here -->
      <section data-markdown="slides.md"
        data-separator="^---$"
        data-separator-vertical="^--$"
        data-separator-notes="^Note:"
        data-charset="utf-8">
      </section>
    </div>
  </div>

  <script src="dist/reveal.js"></script>
  <script src="dist/plugin/markdown.js"></script>
  <script src="dist/plugin/highlight.js"></script>
  <script src="dist/plugin/notes.js"></script>
  <script src="plugin/menu/menu.js"></script>
  <script>
    Reveal.initialize({
      hash: true,
      plugins: [ RevealMarkdown, RevealHighlight, RevealNotes, RevealMenu ],
      menu: {
        side: "left",           // or 'right', 'top', 'bottom'
        width: '300px',          // fallback for custom width
        numbers: true,           // display slide numbers in menu
        titleSelector: 'h1, h2, h3', // headings to extract
        hideMissingTitles: false,
        openOnInit: false,       // do not open menu automatically
        useTextContentForMissingTitles: true // Use text content for slides without headings
      }
    });
  </script>
</body>
</html>
